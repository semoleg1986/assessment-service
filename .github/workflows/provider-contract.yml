name: provider-contract

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - "docs/**"
      - "scripts/export_openapi.py"
      - "openapi.yaml"
      - "requirements*.txt"
      - "requirements.in"
      - "Makefile"
      - ".github/workflows/provider-contract.yml"
  push:
    branches: [ main ]
    paths:
      - "src/**"
      - "tests/**"
      - "docs/**"
      - "scripts/export_openapi.py"
      - "openapi.yaml"
      - "Makefile"
      - ".github/workflows/provider-contract.yml"

jobs:
  provider-contract:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check OpenAPI artifact is in sync
        id: openapi_check
        run: make openapi-check
        continue-on-error: true

      - name: Debug OpenAPI mismatch
        if: steps.openapi_check.outcome != 'success'
        run: |
          make openapi-export
          echo "=== git status ==="
          git status --short
          echo "=== openapi diff ==="
          git diff -- openapi.yaml | sed -n '1,220p'
          exit 1

      - name: Run tests
        run: make test

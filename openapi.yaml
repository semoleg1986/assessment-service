components:
  schemas:
    AssignTestRequest:
      properties:
        test_id:
          type: string
          format: uuid
          title: Test Id
        child_id:
          type: string
          format: uuid
          title: Child Id
      type: object
      required:
      - test_id
      - child_id
      title: AssignTestRequest
    AssignmentListItemResponse:
      properties:
        assignment_id:
          type: string
          format: uuid
          title: Assignment Id
        test_id:
          type: string
          format: uuid
          title: Test Id
        test_title:
          anyOf:
          - type: string
          - type: 'null'
          title: Test Title
        status:
          type: string
          title: Status
        due_at:
          anyOf:
          - type: string
          - type: 'null'
          title: Due At
      type: object
      required:
      - assignment_id
      - test_id
      - status
      title: AssignmentListItemResponse
    AssignmentResponse:
      properties:
        assignment_id:
          type: string
          format: uuid
          title: Assignment Id
        test_id:
          type: string
          format: uuid
          title: Test Id
        child_id:
          type: string
          format: uuid
          title: Child Id
        status:
          type: string
          title: Status
      type: object
      required:
      - assignment_id
      - test_id
      - child_id
      - status
      title: AssignmentResponse
    AttemptAnswerResponse:
      properties:
        question_id:
          type: string
          title: Question Id
        value:
          type: string
          title: Value
        is_correct:
          type: boolean
          title: Is Correct
        awarded_score:
          type: integer
          title: Awarded Score
      type: object
      required:
      - question_id
      - value
      - is_correct
      - awarded_score
      title: AttemptAnswerResponse
    AttemptResultResponse:
      properties:
        attempt_id:
          type: string
          title: Attempt Id
        status:
          type: string
          title: Status
        score:
          type: integer
          title: Score
        answers:
          items:
            $ref: '#/components/schemas/AttemptAnswerResponse'
          type: array
          title: Answers
      type: object
      required:
      - attempt_id
      - status
      - score
      - answers
      title: AttemptResultResponse
    ChildDiagnosticsResponse:
      properties:
        child_id:
          type: string
          format: uuid
          title: Child Id
        assignments_total:
          type: integer
          title: Assignments Total
        attempts_total:
          type: integer
          title: Attempts Total
      type: object
      required:
      - child_id
      - assignments_total
      - attempts_total
      title: ChildDiagnosticsResponse
    ContentImportIssue:
      properties:
        code:
          type: string
          title: Code
        message:
          type: string
          title: Message
        path:
          type: string
          title: Path
      type: object
      required:
      - code
      - message
      - path
      title: ContentImportIssue
    ContentImportMicroSkillItem:
      properties:
        node_id:
          type: string
          title: Node Id
        subject_code:
          type: string
          title: Subject Code
        grade:
          type: integer
          maximum: 11.0
          minimum: 1.0
          title: Grade
        section_code:
          type: string
          title: Section Code
        section_name:
          type: string
          title: Section Name
        micro_skill_name:
          type: string
          title: Micro Skill Name
        predecessor_ids:
          items:
            type: string
          type: array
          title: Predecessor Ids
        criticality:
          $ref: '#/components/schemas/CriticalityLevel'
          default: medium
        source_ref:
          anyOf:
          - type: string
          - type: 'null'
          title: Source Ref
      type: object
      required:
      - node_id
      - subject_code
      - grade
      - section_code
      - section_name
      - micro_skill_name
      title: ContentImportMicroSkillItem
    ContentImportPayload:
      properties:
        subjects:
          items:
            $ref: '#/components/schemas/ContentImportSubjectItem'
          type: array
          title: Subjects
        topics:
          items:
            $ref: '#/components/schemas/ContentImportTopicItem'
          type: array
          title: Topics
        micro_skills:
          items:
            $ref: '#/components/schemas/ContentImportMicroSkillItem'
          type: array
          title: Micro Skills
        tests:
          items:
            $ref: '#/components/schemas/ContentImportTestItem'
          type: array
          title: Tests
      type: object
      title: ContentImportPayload
    ContentImportQuestionItem:
      properties:
        external_id:
          type: string
          title: External Id
        node_id:
          type: string
          title: Node Id
        text:
          type: string
          title: Text
        answer_key:
          type: string
          title: Answer Key
        max_score:
          type: integer
          minimum: 1.0
          title: Max Score
          default: 1
      type: object
      required:
      - external_id
      - node_id
      - text
      - answer_key
      title: ContentImportQuestionItem
    ContentImportRequest:
      properties:
        source_id:
          type: string
          title: Source Id
        contract_version:
          type: string
          title: Contract Version
        validate_only:
          type: boolean
          title: Validate Only
          default: false
        error_mode:
          type: string
          enum:
          - collect
          - fail_fast
          title: Error Mode
          default: collect
        payload:
          $ref: '#/components/schemas/ContentImportPayload'
      type: object
      required:
      - source_id
      - contract_version
      - payload
      title: ContentImportRequest
    ContentImportResponse:
      properties:
        import_id:
          type: string
          title: Import Id
        source_id:
          type: string
          title: Source Id
        imported:
          type: integer
          title: Imported
        status:
          type: string
          title: Status
        errors:
          items:
            $ref: '#/components/schemas/ContentImportIssue'
          type: array
          title: Errors
        warnings:
          items:
            $ref: '#/components/schemas/ContentImportIssue'
          type: array
          title: Warnings
        details:
          anyOf:
          - additionalProperties:
              type: integer
            type: object
          - type: 'null'
          title: Details
      type: object
      required:
      - import_id
      - source_id
      - imported
      - status
      title: ContentImportResponse
    ContentImportSubjectItem:
      properties:
        code:
          type: string
          title: Code
        name:
          type: string
          title: Name
      type: object
      required:
      - code
      - name
      title: ContentImportSubjectItem
    ContentImportTestItem:
      properties:
        external_id:
          type: string
          title: External Id
        subject_code:
          type: string
          title: Subject Code
        grade:
          type: integer
          maximum: 4.0
          minimum: 1.0
          title: Grade
        questions:
          items:
            $ref: '#/components/schemas/ContentImportQuestionItem'
          type: array
          minItems: 1
          title: Questions
      type: object
      required:
      - external_id
      - subject_code
      - grade
      - questions
      title: ContentImportTestItem
    ContentImportTopicItem:
      properties:
        code:
          type: string
          title: Code
        subject_code:
          type: string
          title: Subject Code
        grade:
          type: integer
          maximum: 11.0
          minimum: 1.0
          title: Grade
        name:
          type: string
          title: Name
      type: object
      required:
      - code
      - subject_code
      - grade
      - name
      title: ContentImportTopicItem
    CreateTestRequest:
      properties:
        subject_code:
          type: string
          title: Subject Code
        grade:
          type: integer
          maximum: 4.0
          minimum: 1.0
          title: Grade
        questions:
          items:
            $ref: '#/components/schemas/QuestionCreateRequest'
          type: array
          title: Questions
      type: object
      required:
      - subject_code
      - grade
      - questions
      title: CreateTestRequest
    CriticalityLevel:
      type: string
      enum:
      - low
      - medium
      - high
      title: CriticalityLevel
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    MicroSkillCreateRequest:
      properties:
        node_id:
          type: string
          title: Node Id
        subject_code:
          type: string
          title: Subject Code
        grade:
          type: integer
          maximum: 11.0
          minimum: 1.0
          title: Grade
        section_code:
          type: string
          title: Section Code
        section_name:
          type: string
          title: Section Name
        micro_skill_name:
          type: string
          title: Micro Skill Name
        predecessor_ids:
          items:
            type: string
          type: array
          title: Predecessor Ids
        criticality:
          $ref: '#/components/schemas/CriticalityLevel'
          default: medium
        source_ref:
          anyOf:
          - type: string
          - type: 'null'
          title: Source Ref
      type: object
      required:
      - node_id
      - subject_code
      - grade
      - section_code
      - section_name
      - micro_skill_name
      title: MicroSkillCreateRequest
    MicroSkillLinkRequest:
      properties:
        predecessor_ids:
          items:
            type: string
          type: array
          title: Predecessor Ids
      type: object
      required:

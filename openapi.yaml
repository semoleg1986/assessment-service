                  topic_code_patterns:
                  - string
                  node_id_patterns:
                  - string
                matched:
                  subjects: 1
                  topics: 1
                  micro_skills: 1
                  tests: 1
                  questions: 1
                  assignments: 1
                  attempts: 1
                  answers: 1
                deleted:
